<!DOCTYPE html>
<html> 
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monthly Pass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- QRCode.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
      #popupModal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        border-radius: 12px;
        padding: 18px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        display: none;
        z-index: 9999;
        max-width: 95vw;
        max-height: 95vh;
        overflow: hidden;
      }
      body.modal-open { overflow: hidden; position: fixed; width: 100%; height: 100%; }
      #popupModal .close-btn { display:block; margin-top:12px; text-align:center; cursor:pointer; color:#1d86d7; }
    </style>
</head>

<body>
<div class="curved-background" id="curved-background">
    <div class="header">Monthly Pass</div>
    <div class="card" id="main-container">
        <div style="display: grid; justify-content: center;">
            <div class="qr" id="qr-container" onclick="openPopup(); return false;">
                <div id="qrcode" aria-label="QR code"></div>
            </div>
            <div class="tap">Tap to enlarge</div>
            <div style="border-bottom: 1px dashed #00000050;width: 70vw;padding: 0.2vh;"></div>
            <div class="info">
                <div class="interstate">INTERSTATE</div>
                <table style="width: 120%;position: relative;left: -10%;">
                    <tbody>
                        <tr>
                            <td style="width: 20%; text-align: center;">
                                <div class="month" id="pass_month_year">NOV 2025</div>
                            </td>
                            <td style="width: 60%; text-align: center;" rowspan="2">
                                <div class="zone">
                                    <div class="number" onclick="updateZoneText()">2</div>
                                    <div class="text">ZONE RIDE</div>
                                </div>
                            </td>
                            <td style="width: 20%; text-align: center;"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="progress">
            <div class="color-strip">
                <div class="color-block red"></div>
                <div class="color-block green"></div>
                <div class="color-block blue"></div>
            </div>
            <div class="progress-bar"></div>
            <div class="expiry">
                Expires in <span id="countdown">1</span> <span id="timeUnit">days</span>.
            </div>
        </div>
    </div>
</div>

<!-- Popup modal for larger QR -->
<div id="popupModal" role="dialog" aria-modal="true" aria-hidden="true">
  <div id="popupQRCode" style="display:flex; justify-content:center; align-items:center;"></div>
  <div class="close-btn" onclick="closePopup()">Tap to go back</div>
</div>

<script>
// -------------------------
// Device token & whitelist
// -------------------------
function getDeviceToken() {
    let token = localStorage.getItem("deviceToken");
    if (!token) {
        token = btoa(
            navigator.userAgent + screen.width + screen.height + screen.colorDepth +
            navigator.platform + Intl.DateTimeFormat().resolvedOptions().timeZone +
            navigator.language
        );
        localStorage.setItem("deviceToken", token);
    }
    return token;
}

const currentToken = getDeviceToken();
const allowedDevices = [
    // Paste your allowed device tokens here
    "PUT_YOUR_TOKEN_HERE"
];

if (!allowedDevices.includes(currentToken)) {
    document.body.innerHTML = `
        <h2 style="text-align:center; margin-top:50px;">
            Access Denied ❌
        </h2>
        <p style="text-align:center;">
            This device is not authorized.
        </p>
    `;
    throw new Error("Unauthorized device");
}

// -------------------------
// QR generation
// -------------------------
function buildQrText() {
    const zoneEl = document.querySelector('.number');
    const monthEl = document.getElementById('pass_month_year');

    const zone = zoneEl ? zoneEl.textContent.trim() : '2';
    const month = monthEl ? monthEl.textContent.trim() : 'Unknown';
    const now = new Date().toISOString();

    const payload = {
        type: "monthly_pass",
        provider: "NJ Transit",
        month: month,
        zone: zone,
        issued_at: now,
        device_token: currentToken
    };
    return JSON.stringify(payload);
}

function generateQRCode() {
    const qrText = buildQrText();

    const smallEl = document.getElementById("qrcode");
    if (smallEl) {
        smallEl.innerHTML = "";
        new QRCode(smallEl, { text: qrText, width: 220, height: 220, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.L });
    }

    const popupEl = document.getElementById("popupQRCode");
    if (popupEl) {
        popupEl.innerHTML = "";
        new QRCode(popupEl, { text: qrText, width: 480, height: 480, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.L });
    }
}

function openPopup() {
    document.getElementById('popupModal').style.display = 'block';
    document.body.classList.add('modal-open');
    generateQRCode();
}

function closePopup() {
    document.getElementById('popupModal').style.display = 'none';
    document.body.classList.remove('modal-open');
}

// -------------------------
// Month/Zone/Countdown logic
// -------------------------
function updateMonthAndYear() {
    const now = new Date();
    const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    document.getElementById("pass_month_year").textContent = months[now.getMonth()] + " " + now.getFullYear();
}

function updateZoneText() {
    const zoneEl = document.querySelector('.number');
    let currentZone = parseInt(zoneEl.textContent,10);
    if (isNaN(currentZone)) currentZone = 2;
    currentZone = currentZone === 19 ? 2 : currentZone + 1;
    zoneEl.textContent = currentZone;
    generateQRCode();
}

function updateCountdown() {
    const countdown = document.getElementById('countdown');
    const unit = document.getElementById('timeUnit');
    const now = new Date();
    const end = new Date(now.getFullYear(), now.getMonth()+1, 1, 0,0,0);
    const diff = end - now;
    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const mins = Math.floor((diff%(1000*60*60))/(1000*60));
    const secs = Math.floor((diff%(1000*60))/1000);

    if(days<=0){
        countdown.textContent = ⁠ ${hours}h ${mins}m ${secs}s ⁠;
        unit.textContent = "";
    } else {
        countdown.textContent = days;
        unit.textContent = days===1?"day":"days";
    }

    const progressBar = document.querySelector('.progress-bar');
    if(progressBar){
        const totalDays = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        const progress = (now.getDate()/totalDays)*100;
        progressBar.style.setProperty('--progress-width', ⁠ ${progress}% ⁠);
    }
}

// -------------------------
// Initialization
// -------------------------
function initAll() {
    updateMonthAndYear();
    updateCountdown();
    generateQRCode();
    setInterval(updateCountdown, 1000);
}

if (document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', initAll);
} else { initAll(); }
</script>
</body>
</html>
